name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: uv run ruff check labour_sim tests app.py
      - name: Tests with coverage gate
        run: uv run pytest --cov
